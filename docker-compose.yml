version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: student-hub-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: student_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - student_hub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d student_hub']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  student_hub_postgres_data:
    driver: local
